<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password required — EasyLink</title>
<style>
body{font-family:Inter,sans-serif; background:#0B0E17; color:#F3F4F8; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;}
.box{text-align:center; max-width:340px; padding:30px; background:#121826; border:1px solid rgba(255,255,255,0.08); border-radius:14px;}
h1{font-size:18px; margin-bottom:14px;}
input{width:100%; padding:10px 12px; border-radius:9px; border:1px solid rgba(255,255,255,0.1); background:#1A2232; color:#fff; margin-bottom:12px; font-size:14px;}
button{width:100%; padding:10px; border-radius:9px; border:none; background:#6C5CE7; color:#fff; font-weight:600; cursor:pointer;}
</style>
</head>
<body>
<div class="box">
  <h1>🔒 This link is password protected</h1>
  <form method="POST" action="/{{ alias }}/unlock">
    <input type="password" name="password" placeholder="Enter password" autofocus required>
    <button type="submit">Continue</button>
  </form>
</div>
</body>
</html>
